name: Build module APKs

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute date-based version (YYYY.MM.DD)
        id: ver
        run: |
          echo "name=$(date -u +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"
          echo "code=$(date -u +'%Y%m%d')"   >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug + release
        run: |
          gradle --no-daemon \
            -PappVersionName='${{ steps.ver.outputs.name }}' \
            -PappVersionCode='${{ steps.ver.outputs.code }}' \
            assembleDebug assembleRelease

      - name: Collect APKs
        run: |
          set -euo pipefail
          mkdir -p out
          DEBUG_APK=$(find app/build/outputs/apk/debug   -name '*.apk' | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          test -n "$DEBUG_APK"   || { echo "no debug apk";   exit 1; }
          test -n "$RELEASE_APK" || { echo "no release apk"; exit 1; }
          cp "$DEBUG_APK"   "out/FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-debug.apk"
          cp "$RELEASE_APK" "out/FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-release.apk"
          ls -l out

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-debug
          path: out/*-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-release
          path: out/*-release.apk
          if-no-files-found: error
