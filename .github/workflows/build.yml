name: Build module APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tag builds

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute date-based version (YYYY.MM.DD)
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VNAME="${GITHUB_REF_NAME#v}"     # tag v2026.06.18 -> 2026.06.18
          else
            VNAME="$(date -u +'%Y.%m.%d')"   # untagged build -> build date
          fi
          VCODE="$(printf '%s' "$VNAME" | tr -cd '0-9')"   # 2026.06.18 -> 20260618
          echo "name=$VNAME" >> "$GITHUB_OUTPUT"
          echo "code=$VCODE" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VNAME (code $VCODE)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug + release
        run: |
          gradle --no-daemon \
            -PappVersionName='${{ steps.ver.outputs.name }}' \
            -PappVersionCode='${{ steps.ver.outputs.code }}' \
            assembleDebug assembleRelease

      - name: Collect APKs
        run: |
          set -euo pipefail
          mkdir -p out
          DEBUG_APK=$(find app/build/outputs/apk/debug   -name '*.apk' | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          test -n "$DEBUG_APK"   || { echo "no debug apk";   exit 1; }
          test -n "$RELEASE_APK" || { echo "no release apk"; exit 1; }
          cp "$DEBUG_APK"   "out/FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-debug.apk"
          cp "$RELEASE_APK" "out/FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-release.apk"
          ls -l out

      - name: Upload debug APK (run artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-debug
          path: out/*-debug.apk
          if-no-files-found: error

      - name: Upload release APK (run artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FleetServiceConnectionFix-${{ steps.ver.outputs.name }}-release
          path: out/*-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.ver.outputs.name }}
          files: out/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
